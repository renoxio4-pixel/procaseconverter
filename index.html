<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Pro Case Converter</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon-48x48.ico">
    
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#0d1117">

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

<div class="app-container">
    <div class="ad-placeholder top-banner">
        <small>ADVERTISEMENT</small>
        <div class="demo-ad-content">Auto-Responsive Banner</div>
    </div>

    <header class="main-header">
        <div class="header-top">
            <h1>Case Converter</h1>
            
            <div class="theme-wrapper">
                <span class="icon">☀️</span>
                <label class="switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()" checked>
                    <span class="slider round"></span>
                </label>
                <span class="icon">🌙</span>
            </div>
        </div>
        
        <div class="header-controls">
            <div class="toolbar">
                <div class="font-size-wrapper">
                    <button class="size-btn" id="minusBtn">−</button>
                    <div class="size-display-container">
                        <span id="fontSizeDisplay">16</span>
                        <input type="number" id="fontSizeInput" min="10" max="100" style="display: none;">
                    </div>
                    <button class="size-btn" id="plusBtn">+</button>
                </div>

                <button class="format-btn has-tooltip" id="boldBtn" onclick="toggleBold()">
                    <strong>B</strong>
                    <div class="tooltip">
                        <span class="close-tooltip" onclick="closeTooltip(event, this)">×</span>
                        <div class="tooltip-title">Bold</div>
                        <div class="tooltip-keys"><kbd>Ctrl</kbd> + <kbd>B</kbd></div>
                    </div>
                </button>

                <button class="format-btn has-tooltip" id="italicBtn" onclick="toggleItalic()">
                    <em>I</em>
                    <div class="tooltip">
                        <span class="close-tooltip" onclick="closeTooltip(event, this)">×</span>
                        <div class="tooltip-title">Italic</div>
                        <div class="tooltip-keys"><kbd>Ctrl</kbd> + <kbd>I</kbd></div>
                    </div>
                </button>

                <div class="align-group">
                    <button class="format-btn" onclick="setTextAlign('left')">Left</button>
                    <button class="format-btn" onclick="setTextAlign('center')">Center</button>
                    <button class="format-btn" onclick="setTextAlign('right')">Right</button>
                </div>
            </div>
        </div>
    </header>
    
    <div class="main-layout-wrapper">
        <aside class="ad-placeholder sidebar-ad">
            <small>AD</small>
            <div class="demo-ad-content">160 x 600<br>Skyscraper</div>
        </aside>

        <main class="workspace">
            <div id="textInput" 
                 contenteditable="true" 
                 oninput="handleInput()" 
                 spellcheck="false" 
                 data-placeholder="Type or paste your text here"></div>
        </main>

        <aside class="ad-placeholder sidebar-ad">
            <small>AD</small>
            <div class="demo-ad-content">160 x 600<br>Skyscraper</div>
        </aside>
    </div>
    
    <div class="footer-section">
        <div class="ad-placeholder bottom-banner">
            <small>ADVERTISEMENT</small>
            <div class="demo-ad-content">320 x 50 Mobile / 728 x 90 Desktop</div>
        </div>

        <div class="stats">
            <strong>Chars:</strong> <span id="charCount">0</span> | 
            <strong>Words:</strong> <span id="wordCount">0</span> | 
            <strong>Lines:</strong> <span id="lineCount">0</span>
        </div>

        <div class="button-group">
            <button class="tool-btn" onclick="toSentenceCase()">Sentence case</button>
            <button class="tool-btn" onclick="toLowerCase()">lower case</button>
            <button class="tool-btn" onclick="toUpperCase()">UPPER CASE</button>
            <button class="tool-btn" onclick="toCapitalizedCase()">Capitalized Case</button>
            <button class="tool-btn" onclick="toInverseCase()">iNVERSE cASE</button>
            <button class="tool-btn" onclick="toAlternatingCase()">aLtErNaTiNg cAsE</button>
            
            <button class="tool-btn btn-history has-tooltip" id="undoBtn">
                Undo
                <div class="tooltip">
                    <span class="close-tooltip" onclick="closeTooltip(event, this)">×</span>
                    <div class="tooltip-title">Undo</div>
                    <div class="tooltip-keys"><kbd>Ctrl</kbd> + <kbd>Z</kbd></div>
                </div>
            </button>

            <button class="tool-btn btn-history has-tooltip" id="redoBtn">
                Redo
                <div class="tooltip">
                    <span class="close-tooltip" onclick="closeTooltip(event, this)">×</span>
                    <div class="tooltip-title">Redo</div>
                    <div class="tooltip-keys"><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>Z</kbd></div>
                </div>
            </button>

            <button class="tool-btn btn-download" onclick="downloadText()">Download .txt</button>
            <button class="tool-btn btn-copy" onclick="copyText()">Copy to Clipboard</button>
            <button class="tool-btn btn-clear" onclick="clearText()">Clear</button>
        </div>

        <div class="bottom-bar">
            <div class="save-option">
                <label class="checkbox-container">
                    <input type="checkbox" id="saveProgress" onchange="toggleSavePreference()">
                    Continue where I left off
                </label>
            </div>
            <footer class="site-footer">
                &copy; 2026 Pro Case Converter.
            </footer>
        </div>
    </div>

    <div id="copyToast" class="toast">✔ Copied to clipboard!</div>
</div>

<script src="script.js"></script>
</body>
</html>
